<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px 20px;

            background:
            linear-gradient(
                135deg,
                #e0f2fe,
                #dbeafe,
                #ede9fe
            );

            overflow-y:auto;
        }

        /* Main Card */

        form{

            width:100%;
            max-width:720px;

            background:rgba(255,255,255,0.85);

            backdrop-filter:blur(18px);

            padding:45px;

            border-radius:30px;

            box-shadow:
                0 15px 40px rgba(0,0,0,0.08);

            border:1px solid rgba(255,255,255,0.4);

            animation:fadeIn 0.7s ease;

            position:relative;
        }

        /* Heading */

        .form-title{

            text-align:center;

            margin-bottom:10px;

            font-size:36px;

            font-weight:700;

            color:#0f172a;
        }

        /* Subtitle */

        .form-subtitle{

            text-align:center;

            color:#64748b;

            margin-bottom:35px;

            font-size:15px;
        }

        /* Form Groups */

        form p{

            margin-bottom:22px;
        }

        /* Labels */

        form label{

            display:block;

            margin-bottom:8px;

            color:#334155;

            font-size:15px;

            font-weight:600;
        }

        /* Inputs */

        form input,
        form select,
        form textarea{

            width:100%;

            padding:16px 18px;

            border:1px solid #dbeafe;

            border-radius:16px;

            background:#f8fafc;

            font-size:15px;

            color:#1e293b;

            outline:none;

            transition:0.3s ease;
        }

        /* Placeholder */

        form input::placeholder{

            color:#94a3b8;
        }

        /* Focus */

        form input:focus,
        form select:focus,
        form textarea:focus{

            border-color:#2563eb;

            background:white;

            box-shadow:
                0 0 0 5px rgba(37,99,235,0.12);

            transform:translateY(-2px);
        }

        /* File Input */

        input[type="file"]{

            background:white;

            padding:12px;

            cursor:pointer;
        }

        /* Button */

        button{

            width:100%;

            padding:16px;

            margin-top:15px;

            border:none;

            border-radius:16px;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #4f46e5
            );

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s ease;
        }

        /* Hover */

        button:hover{

            transform:translateY(-3px);

            box-shadow:
                0 12px 24px rgba(37,99,235,0.25);
        }

        /* Active */

        button:active{

            transform:scale(0.98);
        }

        .dashboard-btn{

            position:absolute;

            top:18px;

            right:18px;

            display:inline-block;

            width:auto;

            padding:10px 14px;

            margin-top:0;

            border-radius:12px;

            background:#0f172a;

            color:white;

            font-size:14px;

            font-weight:600;

            text-align:center;

            text-decoration:none;

            transition:0.3s ease;
        }

        .dashboard-btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 12px 24px rgba(15,23,42,0.2);
        }

        /* Error Messages */

        .errorlist{

            list-style:none;

            color:#dc2626;

            margin-top:6px;

            font-size:14px;
        }

        /* Scrollbar */

        ::-webkit-scrollbar{

            width:10px;
        }

        ::-webkit-scrollbar-thumb{

            background:#2563eb;

            border-radius:10px;
        }

        /* Animation */

        @keyframes fadeIn{

            from{

                opacity:0;
                transform:translateY(40px);
            }

            to{

                opacity:1;
                transform:translateY(0);
            }
        }

        /* Responsive */

        @media(max-width:768px){

            body{

                padding:20px 15px;
            }

            form{

                padding:35px 22px;
            }

            .form-title{

                font-size:28px;

                padding-top:38px;
            }

            form input,
            form select,
            form textarea{

                padding:14px;
            }
        }

    </style>

</head>
<body>

    <form action="" method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <h1 class="form-title">
            Employee Registration
        </h1>

        <p class="form-subtitle">
            Fill in employee details to create a professional profile
        </p>

        {{ form.as_p }}

        <button type="submit">
            Save Employee
        </button>

        <a href="{% url 'emp_list' %}" class="dashboard-btn">
            View Dashboard
        </a>

    </form>

</body>
</html>
